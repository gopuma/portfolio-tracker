services:
  mysql:
    image: mysql:8.0
    container_name: portfolio-mysql
    restart: unless-stopped
    environment:
      # Passwords are required from .env (no hardcoded fallback). DB name/user are
      # non-secret identifiers and keep defaults.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required — set it in .env}
      MYSQL_DATABASE: ${DB_NAME:-portfolio}
      MYSQL_USER: ${DB_USER:-portfolio}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in .env}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stateless ML sidecar (Phase 2): gradient-boosting forecasters for the prediction
  # competition. The Node backend POSTs point-in-time price series and gets back
  # forecasts; this service never touches the database.
  ml-sidecar:
    build: ./ml-sidecar
    container_name: portfolio-ml-sidecar
    restart: unless-stopped
    ports:
      - "${ML_SIDECAR_PORT:-8008}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
